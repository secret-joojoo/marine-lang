/* ═══════════════════════════════════════════════════════════════
   오디오 큐 (WAV 순차 재생)
═══════════════════════════════════════════════════════════════ */
let _audioCtx = null;
function getAudioCtx() {
    if (!_audioCtx) _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (_audioCtx.state === 'suspended') _audioCtx.resume();
    return _audioCtx;
}

let _wavQueue = [];
window.marineQueueWav = function(uint8array) {
    _wavQueue.push(new Uint8Array(uint8array).buffer);
};

async function playWavQueue() {
    const ctx = getAudioCtx();
    for (const buf of _wavQueue) {
        try {
            await new Promise(function(resolve, reject) {
                ctx.decodeAudioData(buf, function(ab) {
                    const src = ctx.createBufferSource();
                    src.buffer = ab;
                    src.connect(ctx.destination);
                    src.onended = resolve;
                    src.start(0);
                }, reject);
            });
        } catch(e) { console.error('오디오 재생 실패:', e); }
    }
    _wavQueue = [];
}

    _wavQueue = [];
    const codeStr  = codeEl.value;
    const inputStr = document.getElementById('input_data').value;

    outputEl.innerHTML = "<span class='loading'>▷ 실행 중...</span>";
    runBtn.disabled = true;
    musicBtns.forEach(b => b.disabled = true);

    try {
        await pyodide.runPythonAsync(interpreterCode + '\n\n' + webWrapperCode);
        const runFunc = pyodide.globals.get('run_in_browser');
        const result  = runFunc(codeStr, inputStr);
        outputEl.innerText = result;
        runFunc.destroy();
        await playWavQueue();
    } catch(err) {
        outputEl.innerText = '시스템 오류:\n' + err;
    } finally {
        runBtn.disabled = false;
        musicBtns.forEach(b => b.disabled = false);
    }
});

/* ═══════════════════════════════════════════════════════════════
   줄 번호
═══════════════════════════════════════════════════════════════ */
function updateGutter() {
    const count = codeEl.value.split('\n').length;
    let html = '';
    for (let i = 1; i <= count; i++) {
        html += '<div class="gutter-line">' + i + '</div>';
    }
    gutterEl.innerHTML = html;
}

codeEl.addEventListener('input', updateGutter);
codeEl.addEventListener('scroll', () => { gutterEl.scrollTop = codeEl.scrollTop; });
updateGutter();

/* ═══════════════════════════════════════════════════════════════
   키 처리: Tab → 4칸 공백 / '필승' + Enter → 자동 들여쓰기
═══════════════════════════════════════════════════════════════ */
codeEl.addEventListener('keydown', (e) => {
    const pos  = codeEl.selectionStart;
    const end  = codeEl.selectionEnd;
    const text = codeEl.value;

    if (e.key === 'Tab') {
        e.preventDefault();
        codeEl.value = text.slice(0, pos) + '    ' + text.slice(end);
        codeEl.selectionStart = codeEl.selectionEnd = pos + 4;
        updateGutter();
        return;
    }

    if (e.key === 'Enter') {
        const lineStart   = text.lastIndexOf('\n', pos - 1) + 1;
        const currentLine = text.substring(lineStart, pos);
        if (currentLine.trimEnd().endsWith('필승')) {
            e.preventDefault();
            const indent = currentLine.match(/^[ \t]*/)[0] + '    ';
            const ins    = '\n' + indent;
            codeEl.value = text.slice(0, pos) + ins + text.slice(pos);
            codeEl.selectionStart = codeEl.selectionEnd = pos + ins.length;
            updateGutter();
        }
    }
});

/* ═══════════════════════════════════════════════════════════════
   테마 전환
═══════════════════════════════════════════════════════════════ */
document.getElementById('themeSelect').addEventListener('change', (e) => {
    document.documentElement.setAttribute('data-theme', e.target.value);
});

/* ═══════════════════════════════════════════════════════════════
   폰트 크기
═══════════════════════════════════════════════════════════════ */
document.getElementById('fontSizeSelect').addEventListener('change', (e) => {
    const sz = e.target.value;
    codeEl.style.fontSize       = sz;
    gutterEl.style.fontSize     = sz;
    document.getElementById('input_data').style.fontSize = sz;
    outputEl.style.fontSize     = sz;
    updateGutter();
});

/* ═══════════════════════════════════════════════════════════════
   음악 재생
═══════════════════════════════════════════════════════════════ */
async function playMusicFile(path, btn) {
    _wavQueue = [];
    runBtn.disabled = true;
    musicBtns.forEach(b => b.disabled = true);
    btn.classList.add('playing');
    outputEl.innerHTML = "<span class='loading'>♪ 연주 중...</span>";

    try {
        const res = await fetch(path);
        if (!res.ok) throw new Error('악보 파일을 찾을 수 없다: ' + path);
        const codeStr = await res.text();

        await pyodide.runPythonAsync(interpreterCode + '\n\n' + webWrapperCode);
        const runFunc = pyodide.globals.get('run_in_browser');
        const result  = runFunc(codeStr, '');
        outputEl.innerText = result.trim() ? result : '';
        runFunc.destroy();
        await playWavQueue();
    } catch(err) {
        outputEl.innerText = '오류: ' + err;
    } finally {
        runBtn.disabled = false;
        musicBtns.forEach(b => b.disabled = false);
        btn.classList.remove('playing');
    }
}

musicBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        if (!pyodide || runBtn.disabled) return;
        playMusicFile(btn.dataset.music, btn);
    });
});

/* ═══════════════════════════════════════════════════════════════
   저장 (다운로드)
═══════════════════════════════════════════════════════════════ */
document.getElementById('downloadBtn').addEventListener('click', () => {
    const blob = new Blob([codeEl.value], { type: 'text/plain;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = Object.assign(document.createElement('a'), {
        href: url, download: 'marine.ak'
    });
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
});

/* ═══════════════════════════════════════════════════════════════
   불러오기
═══════════════════════════════════════════════════════════════ */
document.getElementById('uploadBtn').addEventListener('click', () => {
    document.getElementById('fileInput').click();
});
document.getElementById('fileInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
        codeEl.value = ev.target.result;
        updateGutter();
    };
    reader.readAsText(file, 'utf-8');
    e.target.value = '';
});

/* ═══════════════════════════════════════════════════════════════
   드래그 핸들로 크기 조절
═══════════════════════════════════════════════════════════════ */
let dragging = null;

resizeV.addEventListener('mousedown', (e) => {
    dragging = 'v';
    resizeV.classList.add('active');
    document.body.style.cursor     = 'col-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
});

resizeH.addEventListener('mousedown', (e) => {
    dragging = 'h';
    resizeH.classList.add('active');
    document.body.style.cursor     = 'row-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
});

document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    if (dragging === 'v') {
        const rect = workspace.getBoundingClientRect();
        const pct  = Math.max(15, Math.min(85,
            (e.clientX - rect.left) / rect.width * 100));
        paneLeft.style.width = pct + '%';
    } else {
        const rect = paneRight.getBoundingClientRect();
        const pct  = Math.max(10, Math.min(85,
            (e.clientY - rect.top) / rect.height * 100));
        paneInput.style.height = pct + '%';
    }
});

document.addEventListener('mouseup', () => {
    if (!dragging) return;
    resizeV.classList.remove('active');
    resizeH.classList.remove('active');
    document.body.style.cursor     = '';
    document.body.style.userSelect = '';
    dragging = null;
});
</script>
